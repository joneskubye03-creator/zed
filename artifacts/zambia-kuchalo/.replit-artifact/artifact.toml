kind = "web"
previewPath = "/"
title = "Zambia Kuchalo"
version = "1.0.0"
id = "artifacts/zambia-kuchalo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23027

[services.development]
run = "pnpm --filter @workspace/zambia-kuchalo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zambia-kuchalo", "run", "build" ]
publicDir = "artifacts/zambia-kuchalo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23027"
BASE_PATH = "/"
